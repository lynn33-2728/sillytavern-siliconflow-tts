<div class="siliconflow-extension-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-header inline-drawer-toggle">
            <b>硅基语音（TTS）</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down"></div>
        </div>

        <div class="inline-drawer-content" style="display: none;">
            <div class="sf-settings">
                <section class="sf-section sf-progress-note">
                    <small>
                        • 按住左侧 🔊 拖动进度条位置。<br>
                        • 部分手机、平板端可能需按【生成测试语音】后再长按/拉拽【下载音频】才出现语音进度条,不出反复尝试。<br>
                        • ▶ 重听用缓存，不重复扣费。
                    </small>
                </section>

                <section class="sf-section">
                    <h4>1组 API设定</h4>
                    <div class="sf-help-line">从 <a href="https://siliconflow.cn" target="_blank">硅基流动官网</a> 获取API密钥</div>
                    <div class="sf-setting-row">
                        <label for="siliconflow_api_key">API密钥：</label>
                        <input id="siliconflow_api_key" type="password" placeholder="输入你的硅基流动API密钥" />
                    </div>

                    <div class="sf-setting-row">
                        <label for="siliconflow_api_url">API地址：</label>
                        <input id="siliconflow_api_url" type="text" value="https://api.siliconflow.cn/v1" />
                    </div>
                </section> <div class="setting-item button-group">
                    <button id="test_siliconflow_connection" class="menu_button">测试连接</button>
                    <button id="save_siliconflow_settings" class="menu_button">保存设置</button>
                    <span id="connection_status" style="color: red;">未连接</span>
                </div>

                <section class="sf-section">
                    <h4>2组 语音设定</h4>

                    <div class="setting-item button-group sf-grid two sf-compact-grid">
                        <div class="setting-item">
                            <label for="tts_model">TTS模型</label>
                            <select id="tts_model">
                                <option value="FunAudioLLM/CosyVoice2-0.5B">CosyVoice2-0.5B</option>
                            </select>
                        </div>

                        <div class="setting-item">
                            <label for="tts_voice">语音角色</label>
                            <select id="tts_voice">
                                <option value="alex">Alex (男声)</option>
                                <option value="anna">Anna (女声)</option>
                                <option value="bella">Bella (女声)</option>
                                <option value="benjamin">Benjamin (男声)</option>
                                <option value="charles">Charles (男声)</option>
                                <option value="claire">Claire (女声)</option>
                                <option value="david">David (男声)</option>
                                <option value="diana">Diana (女声)</option>
                            </select>
                        </div>
                    </div>

                    <div class="setting-item button-group sf-grid two sf-compact-grid">
                        <div class="setting-item">
                            <label for="tts_speed">语速 <span id="tts_speed_value">1.0</span></label>
                            <input type="range" id="tts_speed" min="0.25" max="4" step="0.01" value="1" />
                        </div>

                        <div class="setting-item">
                            <label for="tts_gain">音量大小 <span id="tts_gain_value">0</span></label>
                            <input type="range" id="tts_gain" min="-10" max="10" step="1" value="0" />
                        </div>
                    </div>

                    <div class="setting-item button-group sf-checkbox-inline-row">
                        <label class="sf-checkbox-item">
                            <input type="checkbox" id="auto_play_audio" checked /> 自动朗读角色消息
                        </label>
                        <label class="sf-checkbox-item">
                            <input type="checkbox" id="auto_play_user" /> 自动朗读用户消息
                        </label>
                    </div>

                    <div class="sf-subsection">
                        <h4>文本截取设置</h4>
                        <div class="setting-item button-group sf-grid two sf-compact-grid">
                            <div class="setting-item">
                                <label for="image_text_start">开始标记</label>
                                <input type="text" id="image_text_start" value="（ 【 &quot;" />
                            </div>

                            <div class="setting-item">
                                <label for="image_text_end">结束标记</label>
                                <input type="text" id="image_text_end" value="） 】 &quot;" />
                            </div>
                        </div>

                        <div class="setting-item button-group sf-setting-row sf-limit-row">
                            <label for="tts_max_read_chars">全文发送上限：</label>
                            <input type="number" id="tts_max_read_chars" min="0" step="1" placeholder="大于设定字数不发送,建议填1500,留空或0=不限制" />
                        </div>

                        <small>
                            支持多组标记，用空格隔开，如：开始填 <code>（ 【 "</code>，结束填 <code>） 】 "</code>。<br>
                            提取不到标记内容时，会自动改读整条消息，不会卡住。
                        </small>
                    </div>
                </section>

                <section class="sf-section">
                    <details class="sf-collapse">           
                      <summary style="font-size: 1.15em; font-weight: bold;">克隆音色</summary>
                      <div class="sf-collapse-body">
                            <div class="setting-item button-group">
                                <div class="setting-item">
                                    <label for="clone_voice_name">音色名称</label>
                                     <small>只能英文字母,数字,下划线,连字符,不超64字符</small>
                                     <input type="text" id="clone_voice_name" placeholder="例如: my_voice_1" pattern="[a-zA-Z0-9_\-]+" />
                                </div>
                            </div>

                            <div class="setting-item">
                                  <label for="clone_voice_text">参考文本</label>
                                  <textarea id="clone_voice_text" placeholder="输入音频对应的文本内容"></textarea>
                            </div>

                            <div class="setting-item">
                                <label for="clone_voice_audio">参考音频</label>
                                <input type="file" id="clone_voice_audio" accept="audio/*" />
                                <small>支持 mp3、wav 等音频格式，建议 5-10 秒清晰语音</small>
                            </div>

                            <div class="setting-item button-group">
                                <div class="setting-item">
                                     <label>已克隆的音色</label>
                                     <div id="custom_voices_list">
                                         <small>暂无自定义音色</small>
                                     </div>
                                </div>
                                <button id="upload_voice" class="menu_button">上传克隆音色</button>
                                <button id="refresh_custom_voices" class="menu_button">刷新音色列表</button>
                            </div>
                        </div>
                    </details>

                    <div class="sf-subsection">
                        <h4>TTS测试</h4>
                        <div class="setting-item">
                            <textarea id="tts_test_text" placeholder="输入测试文本...">你好，这是一个测试语音。</textarea>
                            <button id="test_tts" class="menu_button sf-test-button">生成测试语音</button>
                            <div id="tts_output"></div>
                        </div>
                    </div>
                </section>

                <input type="hidden" id="response_format" value="mp3" />
                <input type="hidden" id="sample_rate" value="32000" />
                <input type="hidden" id="image_size" value="512" />
                <input type="hidden" id="generation_frequency" value="5" />
            </div>
        </div>
    </div>
</div>

<style>
/* 1. 让API密钥和地址变成酒馆同款的紧凑对齐 */
.sf-setting-row {
    display: flex;
    align-items: center;
    margin-bottom: 12px;
    width: 100%;
}

/* 固定左边文字的宽度，并让文字右对齐，这样冒号就能完美对齐 */
.sf-setting-row label {
    width: 90px;          /* 如果觉得文字和框太近或太远，可以微调这个数字 */
    text-align: right;    /* 文字靠右对齐 */
    margin-bottom: 0 !important;
    white-space: nowrap;
    margin-right: 10px;   /* 文字和输入框之间的固定间距 */
}

/* 让输入框自动填满剩下的右侧空间，但保持紧凑 */
.sf-setting-row input {
    flex-grow: 1;
}

/* 2. 让测试连接和保存设置两个按钮平分并排（保持不变） */
.sf-actions-row {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}
.sf-actions-row .menu_button {
    flex: 1;
    margin: 0 !important;
}

/* 3. 让自动朗读的多选框左右并排（保持不变） */
.sf-checkbox-inline-row {
    display: flex;
    gap: 20px;
    margin: 15px 0;
}
.sf-checkbox-item {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
}
.sf-checkbox-item input[type="checkbox"] {
    margin: 0 !important;
}
</style>
